version: '3'

vars:
  PLATFORM: sulfone
  SERVICE: iridium

dotenv:
  - .env

tasks:
  build:
    desc: 'Build the binary'
    cmds:
      - cargo build --release
  run:
    desc: 'Run the application'
    cmds:
      - cargo run {{.CLI_ARGS}}
  lint:
    desc: 'Lint the code'
    cmds:
      - pre-commit run --all-files
  e2e:setup:
    desc: 'Setup e2e environment (auth token, user, .env)'
    cmds:
      - infisical run --env lapras -- ./e2e/setup.sh
  e2e:
    desc: 'Run the e2e tests (build → local → full)'
    cmds:
      - ./e2e/e2e.sh build
      - ./e2e/e2e.sh local
      - ./e2e/e2e.sh full
  e2e:build:
    desc: 'Build and publish all e2e test artifacts'
    cmds:
      - ./e2e/e2e.sh build
  e2e:local:
    desc: 'Run local tests (requires build artifacts)'
    cmds:
      - ./e2e/e2e.sh local
  e2e:full:
    desc: 'Run full-cycle tests (requires build artifacts)'
    cmds:
      - ./e2e/e2e.sh full
