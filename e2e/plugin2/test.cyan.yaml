# Test configuration for plugin2
# Plugin2 generates a file named 'plugin2' with random alphanumeric characters
# Note: Since the content is random, we only verify file existence, not content

tests:
  - name: generates_random_file
    expected:
      type: snapshot
      value:
        path: ./snapshots/generates_random_file
    validate:
      - test -f plugin2
      - test $(wc -c < plugin2) -eq 15
