# Test configuration for plugin2
# Plugin2 generates a file named 'plugin2' with fixed deterministic content for snapshot testing

tests:
  - name: generates_deterministic_file
    expected:
      type: snapshot
      value:
        path: ./snapshots/generates_deterministic_file
    validate:
      - test -f plugin2
      - test $(wc -c < plugin2) -eq 16
